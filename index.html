<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cookie Clicker Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>🍪 Cookie Clicker</h1>

  <div class="game">
    <img id="cookie" src="https://upload.wikimedia.org/wikipedia/commons/7/70/Chocolate_Chip_Cookies_-_kimberlykv.jpg" alt="cookie">
    
    <h2>Cookies: <span id="count">0</span></h2>
    <h3>Per second: <span id="cps">0</span></h3>

    <div class="shop">
      <button onclick="buyCursor()">Buy Cursor (50 cookies)</button>
      <button onclick="buyGrandma()">Buy Grandma (200 cookies)</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
